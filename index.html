const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ---------- local storage shim (compatible con la API de artifacts) ---------- */
const storage = {
  get: (key) => new Promise((resolve, reject) => {
    try {
      const v = localStorage.getItem(key);
      if (v === null) { reject(new Error("not found")); return; }
      resolve({ key, value: v });
    } catch (e) { reject(e); }
  }),
  set: (key, value) => new Promise((resolve, reject) => {
    try { localStorage.setItem(key, value); resolve({ key, value }); }
    catch (e) { reject(e); }
  }),
};

/* ---------- tokens: glass / white / celeste ---------- */
const C = {
  bgTop: "#EAF6FF", bgMid: "#DCEFFC", bgBot: "#CDE7F7",
  glass: "rgba(255,255,255,0.55)", glassStrong: "rgba(255,255,255,0.72)", glassBorder: "rgba(255,255,255,0.75)",
  celeste: "#0EA5E9", celesteSoft: "#38BDF8", celesteDeep: "#0284C7",
  ink: "#1E293B", muted: "#64748B", mutedSoft: "#94A3B8",
  danger: "#E27A83", success: "#22C3A6",
  shadow: "0 8px 32px rgba(14,116,144,0.14)",
};

const PALETTE = ["#0EA5E9","#38BDF8","#22D3EE","#22C3A6","#818CF8","#A78BFA","#F0A8C1","#F5B971"];

const EXPENSE_CATS = [
  { id: "comida", label: "Comida", emoji: "🍔", color: "#38BDF8", type: "expense" },
  { id: "transporte", label: "Transporte", emoji: "🚗", color: "#0EA5E9", type: "expense" },
  { id: "servicios", label: "Servicios", emoji: "⚡", color: "#22D3EE", type: "expense" },
  { id: "vivienda", label: "Vivienda", emoji: "🏠", color: "#818CF8", type: "expense" },
  { id: "entretenimiento", label: "Entretenimiento", emoji: "🎬", color: "#A78BFA", type: "expense" },
  { id: "apuestas", label: "Apuestas / Trading", emoji: "📈", color: "#F0A8C1", type: "expense" },
  { id: "mascota", label: "Mascota", emoji: "🐾", color: "#22C3A6", type: "expense" },
  { id: "estudio", label: "SENA / Estudio", emoji: "🎓", color: "#0284C7", type: "expense" },
  { id: "compras", label: "Compras", emoji: "🛍️", color: "#F5B971", type: "expense" },
  { id: "otros", label: "Otros", emoji: "•••", color: "#94A3B8", type: "expense" },
];
const INCOME_CATS = [
  { id: "trabajo", label: "Trabajo / SENA", emoji: "💼", color: "#22C3A6", type: "income" },
  { id: "ganancia", label: "Apuestas / Trading", emoji: "📈", color: "#0EA5E9", type: "income" },
  { id: "otros_ing", label: "Otros", emoji: "🎁", color: "#38BDF8", type: "income" },
];
const BUILTIN_CATS = [...EXPENSE_CATS, ...INCOME_CATS];
const STORAGE_KEY = "finanzas-data-standalone";
const RECENT_LIMIT = 15;

const fmtCOP = (n) => new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP", maximumFractionDigits: 0 }).format(n || 0);
const monthKey = (d) => `${d.getFullYear()}-${d.getMonth()}`;
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const getCategories = (type, custom) => [...BUILTIN_CATS.filter(c => c.type === type), ...custom.filter(c => c.type === type)];
const findCategory = (id, custom) => BUILTIN_CATS.find(c => c.id === id) || custom.find(c => c.id === id) || EXPENSE_CATS.at(-1);

function resizeImageFile(file, maxSize = 140, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxSize) { height = Math.round(height * maxSize / width); width = maxSize; }
        else if (height > maxSize) { width = Math.round(width * maxSize / height); height = maxSize; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const glassCardStyle = (extra) => ({ background: C.glass, backdropFilter: "blur(18px)", WebkitBackdropFilter: "blur(18px)", border: `1px solid ${C.glassBorder}`, borderRadius: 22, boxShadow: C.shadow, ...extra });
const Card = ({ children, style }) => <div style={glassCardStyle(style)}>{children}</div>;

const Pill = ({ active, onClick, children, tone = C.celeste }) => (
  <button onClick={onClick} style={{ padding: "9px 16px", borderRadius: 999, border: `1px solid ${active ? tone : "rgba(148,163,184,0.35)"}`, background: active ? `${tone}22` : "rgba(255,255,255,0.4)", color: active ? tone : C.muted, fontFamily: "Inter", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>{children}</button>
);

function CatBadge({ cat, size = 26 }) {
  if (cat.image) return (
    <div style={{ width: size, height: size, borderRadius: size * 0.36, overflow: "hidden", flexShrink: 0, border: `1px solid ${C.glassBorder}` }}>
      <img src={cat.image} alt={cat.label} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
    </div>
  );
  return (
    <div style={{ width: size, height: size, borderRadius: size * 0.36, flexShrink: 0, background: `${cat.color}26`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.55 }}>
      {cat.emoji || cat.label.charAt(0).toUpperCase()}
    </div>
  );
}

function BudgetGauge({ percent, size = 220 }) {
  const clamped = Math.min(percent, 130);
  const needleAngle = Math.min(-90 + Math.min(clamped, 100) * 1.8 + Math.max(clamped - 100, 0) * 1.8, 144);
  const color = percent < 70 ? C.success : percent < 100 ? "#F0A860" : C.danger;
  const r = size / 2 - 14, cx = size / 2, cy = size / 2;
  const ticks = [];
  for (let i = 0; i <= 10; i++) {
    const a = (-90 + i * 18) * (Math.PI / 180);
    ticks.push(<line key={i} x1={cx + Math.cos(a)*(r-2)} y1={cy + Math.sin(a)*(r-2)} x2={cx + Math.cos(a)*(r-12)} y2={cy + Math.sin(a)*(r-12)} stroke="rgba(100,116,139,0.28)" strokeWidth={i % 5 === 0 ? 2.5 : 1.5} />);
  }
  const arcPath = (start, end, radius) => {
    const s = start * Math.PI / 180, e = end * Math.PI / 180;
    const x1 = cx + Math.cos(s)*radius, y1 = cy + Math.sin(s)*radius, x2 = cx + Math.cos(e)*radius, y2 = cy + Math.sin(e)*radius;
    return `M ${x1} ${y1} A ${radius} ${radius} 0 ${end-start>180?1:0} 1 ${x2} ${y2}`;
  };
  return (
    <svg width={size} height={size/2+40} viewBox={`0 0 ${size} ${size/2+40}`}>
      <path d={arcPath(-90,90,r)} fill="none" stroke="rgba(148,163,184,0.25)" strokeWidth="10" strokeLinecap="round" />
      <path d={arcPath(-90, Math.min(-90+Math.min(percent,100)*1.8,90))} fill="none" stroke={color} strokeWidth="10" strokeLinecap="round" style={{ transition: "all 0.6s" }} />
      {ticks}
      <g style={{ transform: `rotate(${needleAngle}deg)`, transformOrigin: `${cx}px ${cy}px`, transition: "transform 0.7s" }}>
        <line x1={cx} y1={cy} x2={cx} y2={cy-r+16} stroke={color} strokeWidth="3" strokeLinecap="round" />
      </g>
      <circle cx={cx} cy={cy} r="6" fill={color} />
      <text x={cx} y={cy-r/2-2} textAnchor="middle" fill={C.ink} fontFamily="Space Grotesk" fontSize="26" fontWeight="700">{Math.round(percent)}%</text>
      <text x={cx} y={cy-r/2+18} textAnchor="middle" fill={C.muted} fontFamily="Inter" fontSize="11">del presupuesto</text>
    </svg>
  );
}

function CategoryPicker({ type, custom, selected, onSelect, onCreateNew }) {
  const cats = getCategories(type, custom);
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
      {cats.map(c => {
        const active = selected === c.id;
        return (
          <button key={c.id} onClick={() => onSelect(c.id)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 12px 7px 7px", borderRadius: 999, border: `1px solid ${active ? c.color : "rgba(148,163,184,0.35)"}`, background: active ? `${c.color}22` : "rgba(255,255,255,0.45)", color: active ? C.ink : C.muted, fontFamily: "Inter", fontSize: 12.5, fontWeight: 600, cursor: "pointer" }}>
            <CatBadge cat={c} size={22} /> {c.label}
          </button>
        );
      })}
      <button onClick={onCreateNew} style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 14px 7px 10px", borderRadius: 999, border: `1px dashed ${C.celeste}`, background: "rgba(14,165,233,0.08)", color: C.celesteDeep, fontFamily: "Inter", fontSize: 12.5, fontWeight: 700, cursor: "pointer" }}>
        + Nueva
      </button>
    </div>
  );
}

function CategoryCreatorModal({ type, onCreate, onClose }) {
  const [name, setName] = useState("");
  const [color, setColor] = useState(PALETTE[0]);
  const [images, setImages] = useState([]);
  const [selectedImage, setSelectedImage] = useState(null);
  const fileRef = useRef(null);

  const handleFiles = async (e) => {
    const files = Array.from(e.target.files || []).slice(0, 8);
    const resized = await Promise.all(files.map(f => resizeImageFile(f)));
    setImages(prev => [...prev, ...resized]);
    if (!selectedImage && resized[0]) setSelectedImage(resized[0]);
  };

  const save = () => {
    if (!name.trim()) return;
    onCreate({ id: "custom_" + uid(), label: name.trim(), color, image: selectedImage, type });
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(30,41,59,0.35)", backdropFilter: "blur(4px)", display: "flex", alignItems: "flex-end", zIndex: 60 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ width: "100%", maxWidth: 420, margin: "0 auto", background: C.glassStrong, backdropFilter: "blur(24px)", WebkitBackdropFilter: "blur(24px)", borderTopLeftRadius: 26, borderTopRightRadius: 26, padding: 20, border: `1px solid ${C.glassBorder}`, maxHeight: "88vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ color: C.ink, fontFamily: "Space Grotesk", fontWeight: 700, fontSize: 17 }}>✨ Nueva categoría</div>
          <button onClick={onClose} style={{ background: "transparent", border: "none", color: C.muted, cursor: "pointer", fontSize: 20 }}>✕</button>
        </div>
        <label style={{ color: C.muted, fontFamily: "Inter", fontSize: 12 }}>Nombre</label>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="Ej: Gasolina moto, Uñas gato..." style={{ width: "100%", marginTop: 4, marginBottom: 16, background: "rgba(255,255,255,0.6)", border: `1px solid ${C.glassBorder}`, borderRadius: 12, padding: "11px 12px", color: C.ink, fontFamily: "Inter", fontSize: 14, boxSizing: "border-box" }} />
        <label style={{ color: C.muted, fontFamily: "Inter", fontSize: 12 }}>Color</label>
        <div style={{ display: "flex", gap: 8, marginTop: 8, marginBottom: 16, flexWrap: "wrap" }}>
          {PALETTE.map(p => <button key={p} onClick={() => setColor(p)} style={{ width: 32, height: 32, borderRadius: "50%", background: p, border: color === p ? `3px solid ${C.ink}` : "3px solid transparent", cursor: "pointer" }} />)}
        </div>
        <label style={{ color: C.muted, fontFamily: "Inter", fontSize: 12 }}>Imagen (puedes elegir varias y seleccionar una)</label>
        <input ref={fileRef} type="file" accept="image/*" multiple onChange={handleFiles} style={{ display: "none" }} />
        <button onClick={() => fileRef.current?.click()} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, width: "100%", marginTop: 8, padding: "12px 0", borderRadius: 12, border: `1px dashed ${C.celeste}`, background: "rgba(14,165,233,0.06)", color: C.celesteDeep, fontFamily: "Inter", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
          🖼️ Elegir imágenes
        </button>
        {images.length > 0 && (
          <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
            {images.map((img, i) => (
              <button key={i} onClick={() => setSelectedImage(img)} style={{ width: 56, height: 56, borderRadius: 14, padding: 0, overflow: "hidden", cursor: "pointer", border: selectedImage === img ? `3px solid ${C.celeste}` : `1px solid ${C.glassBorder}`, background: "none" }}>
                <img src={img} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
              </button>
            ))}
          </div>
        )}
        <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
          <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 14, background: "rgba(255,255,255,0.5)", border: `1px solid ${C.glassBorder}` }}>
            <CatBadge cat={{ label: name || "Vista previa", color, image: selectedImage }} size={30} />
            <span style={{ color: C.ink, fontFamily: "Inter", fontSize: 13, fontWeight: 600 }}>{name || "Vista previa"}</span>
          </div>
        </div>
        <button onClick={save} disabled={!name.trim()} style={{ width: "100%", marginTop: 16, background: name.trim() ? `linear-gradient(135deg, ${C.celeste}, ${C.celesteDeep})` : "rgba(148,163,184,0.4)", border: "none", borderRadius: 14, padding: "13px 0", color: "#fff", fontFamily: "Inter", fontWeight: 700, fontSize: 14, cursor: name.trim() ? "pointer" : "not-allowed" }}>
          ✓ Crear categoría
        </button>
      </div>
    </div>
  );
}

function TransactionForm({ custom, onAdd, onRequestCreateCategory, initialType = "expense", onDone }) {
  const [type, setType] = useState(initialType);
  const [amount, setAmount] = useState("");
  const [category, setCategory] = useState(getCategories(initialType, custom)[0]?.id || "");
  const [desc, setDesc] = useState("");

  useEffect(() => {
    const list = getCategories(type, custom);
    if (!list.find(c => c.id === category)) setCategory(list[0]?.id || "");
    // eslint-disable-next-line
  }, [type, custom]);

  const submit = () => {
    const n = Number(amount);
    if (!n || n <= 0 || !category) return;
    onAdd({ id: uid(), type, amount: n, category, description: desc.trim(), date: new Date().toISOString() });
    setAmount(""); setDesc("");
    onDone && onDone();
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <Pill active={type === "expense"} onClick={() => setType("expense")} tone={C.danger}>Gasto</Pill>
        <Pill active={type === "income"} onClick={() => setType("income")} tone={C.success}>Ingreso</Pill>
      </div>
      <label style={{ color: C.muted, fontFamily: "Inter", fontSize: 12 }}>Monto (COP)</label>
      <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0" style={{ width: "100%", marginTop: 4, marginBottom: 12, background: "rgba(255,255,255,0.55)", border: `1px solid ${C.glassBorder}`, borderRadius: 12, padding: "12px", color: C.ink, fontFamily: "JetBrains Mono", fontSize: 18, boxSizing: "border-box" }} />
      <label style={{ color: C.muted, fontFamily: "Inter", fontSize: 12 }}>Categoría</label>
      <div style={{ marginTop: 6, marginBottom: 12 }}>
        <CategoryPicker type={type} custom={custom} selected={category} onSelect={setCategory} onCreateNew={() => onRequestCreateCategory(type, setCategory)} />
      </div>
      <label style={{ color: C.muted, fontFamily: "Inter", fontSize: 12 }}>Descripción (opcional)</label>
      <input value={desc} onChange={e => setDesc(e.target.value)} placeholder="Ej: Almuerzo, recarga, Bet Builder..." style={{ width: "100%", marginTop: 4, marginBottom: 14, background: "rgba(255,255,255,0.55)", border: `1px solid ${C.glassBorder}`, borderRadius: 12, padding: "10px 12px", color: C.ink, fontFamily: "Inter", fontSize: 13, boxSizing: "border-box" }} />
      <button onClick={submit} style={{ width: "100%", background: `linear-gradient(135deg, ${type === "expense" ? C.danger : C.success}, ${C.celeste})`, border: "none", borderRadius: 14, padding: "13px 0", color: "#fff", fontFamily: "Inter", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
        + Registrar {type === "expense" ? "gasto" : "ingreso"}
      </button>
    </div>
  );
}

function Dashboard({ transactions, budget, custom, onOpenSettings }) {
  const now = new Date();
  const thisMonth = transactions.filter(t => monthKey(new Date(t.date)) === monthKey(now));
  const lastMonthDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const lastMonth = transactions.filter(t => monthKey(new Date(t.date)) === monthKey(lastMonthDate));
  const income = thisMonth.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
  const expense = thisMonth.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
  const lastExpense = lastMonth.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
  const balanceTotal = transactions.reduce((s, t) => s + (t.type === "income" ? t.amount : -t.amount), 0);
  const budgetPercent = budget.monthlyLimit > 0 ? (expense / budget.monthlyLimit) * 100 : 0;
  const savingsPercent = budget.savingsGoal > 0 ? Math.min((budget.savingsCurrent / budget.savingsGoal) * 100, 100) : 0;
  const catTotals = useMemo(() => {
    const map = {};
    thisMonth.filter(t => t.type === "expense").forEach(t => { map[t.category] = (map[t.category] || 0) + t.amount; });
    return Object.entries(map).map(([id, amount]) => ({ ...findCategory(id, custom), id, amount })).sort((a, b) => b.amount - a.amount);
  }, [thisMonth, custom]);
  const maxCat = catTotals[0]?.amount || 1;
  const expenseDelta = lastExpense > 0 ? ((expense - lastExpense) / lastExpense) * 100 : 0;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14, paddingBottom: 110 }}>
      <Card style={{ padding: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ color: C.muted, fontFamily: "Inter", fontSize: 12, letterSpacing: 0.5, textTransform: "uppercase" }}>Saldo total</div>
            <div style={{ color: C.ink, fontFamily: "JetBrains Mono", fontWeight: 700, fontSize: 30, marginTop: 4 }}>{fmtCOP(balanceTotal)}</div>
          </div>
          <button onClick={onOpenSettings} style={{ background: "rgba(255,255,255,0.6)", border: `1px solid ${C.glassBorder}`, borderRadius: 12, padding: 8, color: C.celesteDeep, cursor: "pointer", fontSize: 16 }}>⚙</button>
        </div>
        <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
          <div style={{ flex: 1, background: "rgba(34,195,166,0.12)", borderRadius: 14, padding: "10px 12px", border: "1px solid rgba(34,195,166,0.25)" }}>
            <div style={{ color: "#189879", fontSize: 11, fontFamily: "Inter", fontWeight: 700 }}>↗ INGRESOS</div>
            <div style={{ color: C.ink, fontFamily: "JetBrains Mono", fontSize: 16, marginTop: 4 }}>{fmtCOP(income)}</div>
          </div>
          <div style={{ flex: 1, background: "rgba(226,122,131,0.12)", borderRadius: 14, padding: "10px 12px", border: "1px solid rgba(226,122,131,0.25)" }}>
            <div style={{ color: "#C15A63", fontSize: 11, fontFamily: "Inter", fontWeight: 700 }}>↘ GASTOS</div>
            <div style={{ color: C.ink, fontFamily: "JetBrains Mono", fontSize: 16, marginTop: 4 }}>{fmtCOP(expense)}</div>
          </div>
        </div>
        {lastExpense > 0 && <div style={{ marginTop: 10, color: C.muted, fontSize: 12, fontFamily: "Inter" }}>{expenseDelta >= 0 ? "▲" : "▼"} {Math.abs(expenseDelta).toFixed(0)}% vs. mes anterior</div>}
      </Card>

      <Card>
        <div style={{ color: C.muted, fontFamily: "Inter", fontSize: 12, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 4 }}>Medidor de presupuesto mensual</div>
        {budget.monthlyLimit > 0 ? (
          <>
            <div style={{ display: "flex", justifyContent: "center" }}><BudgetGauge percent={budgetPercent} /></div>
            <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "JetBrains Mono", fontSize: 13, color: C.muted, padding: "0 8px" }}>
              <span>{fmtCOP(expense)}</span><span>{fmtCOP(budget.monthlyLimit)}</span>
            </div>
          </>
        ) : <div style={{ color: C.muted, fontFamily: "Inter", fontSize: 13, padding: "20px 0", textAlign: "center" }}>Configura tu presupuesto mensual en ⚙ para activar el medidor.</div>}
      </Card>

      {budget.savingsGoal > 0 && (
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ color: C.muted, fontFamily: "Inter", fontSize: 12, letterSpacing: 0.5, textTransform: "uppercase" }}>Meta de ahorro</div>
            <div style={{ color: C.ink, fontFamily: "JetBrains Mono", fontSize: 13 }}>{fmtCOP(budget.savingsCurrent)} / {fmtCOP(budget.savingsGoal)}</div>
          </div>
          <div style={{ height: 10, background: "rgba(148,163,184,0.25)", borderRadius: 999, overflow: "hidden" }}>
            <div style={{ width: `${savingsPercent}%`, height: "100%", background: `linear-gradient(90deg, ${C.celeste}, ${C.success})`, transition: "width 0.6s" }} />
          </div>
        </Card>
      )}

      <Card>
        <div style={{ color: C.muted, fontFamily: "Inter", fontSize: 12, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 10 }}>Gastos por categoría · este mes</div>
        {catTotals.length === 0 ? <div style={{ color: C.muted, fontFamily: "Inter", fontSize: 13, textAlign: "center", padding: "16px 0" }}>Aún no registras gastos este mes.</div> : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {catTotals.map(c => {
              const pct = (c.amount / maxCat) * 100;
              return (
                <div key={c.id}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}><CatBadge cat={c} size={26} /><span style={{ color: C.ink, fontFamily: "Inter", fontSize: 13 }}>{c.label}</span></div>
                    <span style={{ color: C.muted, fontFamily: "JetBrains Mono", fontSize: 12 }}>{fmtCOP(c.amount)}</span>
                  </div>
                  <div style={{ height: 6, background: "rgba(148,163,184,0.22)", borderRadius: 999, overflow: "hidden" }}>
                    <div style={{ width: `${pct}%`, height: "100%", background: c.color, transition: "width 0.6s" }} />
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </Card>
    </div>
  );
}

function SettingsModal({ budget, custom, onSave, onDeleteCategory, onClose }) {
  const [limit, setLimit] = useState(budget.monthlyLimit || "");
  const [goal, setGoal] = useState(budget.savingsGoal || "");
  const [current, setCurrent] = useState(budget.savingsCurrent || "");
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(30,41,59,0.35)", backdropFilter: "blur(4px)", display: "flex", alignItems: "flex-end", zIndex: 50 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ width: "100%", maxWidth: 420, margin: "0 auto", background: C.glassStrong, backdropFilter: "blur(24px)", WebkitBackdropFilter: "blur(24px)", borderTopLeftRadius: 26, borderTopRightRadius: 26, padding: 20, border: `1px solid ${C.glassBorder}`, maxHeight: "85vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ color: C.ink, fontFamily: "Space Grotesk", fontWeight: 700, fontSize: 17 }}>Presupuesto y metas</div>
          <button onClick={onClose} style={{ background: "transparent", border: "none", color: C.muted, cursor: "pointer", fontSize: 20 }}>✕</button>
        </div>
        {[{ label: "Presupuesto mensual (COP)", value: limit, set: setLimit }, { label: "Meta de ahorro (COP)", value: goal, set: setGoal }, { label: "Ahorro actual (COP)", value: current, set: setCurrent }].map(f => (
          <div key={f.label} style={{ marginBottom: 12 }}>
            <label style={{ color: C.muted, fontFamily: "Inter", fontSize: 12 }}>{f.label}</label>
            <input type="number" value={f.value} onChange={e => f.set(e.target.value)} style={{ width: "100%", marginTop: 4, background: "rgba(255,255,255,0.55)", border: `1px solid ${C.glassBorder}`, borderRadius: 12, padding: "10px 12px", color: C.ink, fontFamily: "JetBrains Mono", fontSize: 14, boxSizing: "border-box" }} />
          </div>
        ))}
        <button onClick={() => onSave({ monthlyLimit: Number(limit) || 0, savingsGoal: Number(goal) || 0, savingsCurrent: Number(current) || 0 })} style={{ width: "100%", marginTop: 6, background: `linear-gradient(135deg, ${C.celeste}, ${C.celesteDeep})`, border: "none", borderRadius: 14, padding: "12px 0", color: "#fff", fontFamily: "Inter", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>✓ Guardar</button>
        {custom.length > 0 && (
          <div style={{ marginTop: 22 }}>
            <div style={{ color: C.muted, fontFamily: "Inter", fontSize: 12, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 10 }}>Tus categorías</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {custom.map(c => (
                <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, background: "rgba(255,255,255,0.45)", border: `1px solid ${C.glassBorder}`, borderRadius: 12, padding: "8px 10px" }}>
                  <CatBadge cat={c} size={28} />
                  <span style={{ flex: 1, color: C.ink, fontFamily: "Inter", fontSize: 13 }}>{c.label}</span>
                  <span style={{ color: C.mutedSoft, fontFamily: "Inter", fontSize: 11 }}>{c.type === "expense" ? "gasto" : "ingreso"}</span>
                  <button onClick={() => onDeleteCategory(c.id)} style={{ background: "transparent", border: "none", color: C.danger, cursor: "pointer", padding: 4 }}>🗑</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Movimientos({ transactions, custom, onAdd, onDelete, onRequestCreateCategory }) {
  const grouped = useMemo(() => {
    const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, RECENT_LIMIT);
    const g = {};
    sorted.forEach(t => {
      const key = new Date(t.date).toLocaleDateString("es-CO", { day: "numeric", month: "long", year: "numeric" });
      g[key] = g[key] || []; g[key].push(t);
    });
    return g;
  }, [transactions]);
  const hasMovements = Object.keys(grouped).length > 0;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14, paddingBottom: 110 }}>
      <Card style={{ padding: 18 }}><TransactionForm custom={custom} onAdd={onAdd} onRequestCreateCategory={onRequestCreateCategory} /></Card>
      {hasMovements && (
        <div>
          <div style={{ color: C.muted, fontFamily: "Inter", fontSize: 12, letterSpacing: 0.5, textTransform: "uppercase", margin: "4px 0 10px 2px" }}>Últimos movimientos</div>
          {Object.entries(grouped).map(([day, items]) => (
            <div key={day} style={{ marginBottom: 12 }}>
              <div style={{ color: C.muted, fontFamily: "Inter", fontSize: 11, margin: "0 0 6px 4px", textTransform: "capitalize" }}>{day}</div>
              <Card style={{ padding: 6 }}>
                {items.map((t, i) => {
                  const c = findCategory(t.category, custom);
                  return (
                    <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 8px", borderBottom: i < items.length - 1 ? "1px solid rgba(148,163,184,0.2)" : "none" }}>
                      <CatBadge cat={c} size={34} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ color: C.ink, fontFamily: "Inter", fontSize: 13, fontWeight: 500 }}>{c.label}</div>
                        {t.description && <div style={{ color: C.muted, fontFamily: "Inter", fontSize: 11.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.description}</div>}
                      </div>
                      <div style={{ color: t.type === "income" ? "#189879" : "#C15A63", fontFamily: "JetBrains Mono", fontSize: 13.5, fontWeight: 600, whiteSpace: "nowrap" }}>{t.type === "income" ? "+" : "−"}{fmtCOP(t.amount)}</div>
                      <button onClick={() => onDelete(t.id)} style={{ background: "transparent", border: "none", color: C.mutedSoft, cursor: "pointer", padding: 4 }}>🗑</button>
                    </div>
                  );
                })}
              </Card>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function QuickAddModal({ custom, onAdd, onRequestCreateCategory, onClose }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(30,41,59,0.35)", backdropFilter: "blur(4px)", display: "flex", alignItems: "flex-end", zIndex: 55 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ width: "100%", maxWidth: 420, margin: "0 auto", background: C.glassStrong, backdropFilter: "blur(24px)", WebkitBackdropFilter: "blur(24px)", borderTopLeftRadius: 26, borderTopRightRadius: 26, padding: 20, border: `1px solid ${C.glassBorder}`, maxHeight: "88vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ color: C.ink, fontFamily: "Space Grotesk", fontWeight: 700, fontSize: 17 }}>+ Registrar movimiento</div>
          <button onClick={onClose} style={{ background: "transparent", border: "none", color: C.muted, cursor: "pointer", fontSize: 20 }}>✕</button>
        </div>
        <TransactionForm custom={custom} onAdd={onAdd} onRequestCreateCategory={onRequestCreateCategory} onDone={onClose} />
      </div>
    </div>
  );
}

function GlassBackground() {
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: -1, overflow: "hidden", background: `linear-gradient(160deg, ${C.bgTop}, ${C.bgMid} 45%, ${C.bgBot})` }}>
      <div style={{ position: "absolute", top: -80, left: -60, width: 260, height: 260, borderRadius: "50%", background: "rgba(56,189,248,0.35)", filter: "blur(70px)" }} />
      <div style={{ position: "absolute", bottom: 40, right: -70, width: 300, height: 300, borderRadius: "50%", background: "rgba(14,165,233,0.28)", filter: "blur(80px)" }} />
      <div style={{ position: "absolute", top: "40%", right: "20%", width: 180, height: 180, borderRadius: "50%", background: "rgba(255,255,255,0.5)", filter: "blur(60px)" }} />
    </div>
  );
}

function FinanceApp() {
  const [tab, setTab] = useState("dashboard");
  const [transactions, setTransactions] = useState([]);
  const [budget, setBudget] = useState({ monthlyLimit: 0, savingsGoal: 0, savingsCurrent: 0 });
  const [custom, setCustom] = useState([]);
  const [showSettings, setShowSettings] = useState(false);
  const [showQuickAdd, setShowQuickAdd] = useState(false);
  const [categoryCreatorCtx, setCategoryCreatorCtx] = useState(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get(STORAGE_KEY);
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          setTransactions(parsed.transactions || []);
          setBudget(parsed.budget || { monthlyLimit: 0, savingsGoal: 0, savingsCurrent: 0 });
          setCustom(parsed.customCategories || []);
        }
      } catch (e) {} finally { setLoaded(true); }
    })();
  }, []);

  const persist = useCallback(async (next) => { try { await storage.set(STORAGE_KEY, JSON.stringify(next)); } catch (e) { console.error(e); } }, []);

  const addTransaction = (t) => { const next = [t, ...transactions]; setTransactions(next); persist({ transactions: next, budget, customCategories: custom }); };
  const deleteTransaction = (id) => { const next = transactions.filter(t => t.id !== id); setTransactions(next); persist({ transactions: next, budget, customCategories: custom }); };
  const saveBudget = (b) => { setBudget(b); persist({ transactions, budget: b, customCategories: custom }); setShowSettings(false); };
  const requestCreateCategory = (type, applyFn) => setCategoryCreatorCtx({ type, applyFn });
  const createCategory = (newCat) => {
    const next = [...custom, newCat]; setCustom(next);
    persist({ transactions, budget, customCategories: next });
    categoryCreatorCtx?.applyFn?.(newCat.id);
    setCategoryCreatorCtx(null);
  };
  const deleteCategory = (id) => { const next = custom.filter(c => c.id !== id); setCustom(next); persist({ transactions, budget, customCategories: next }); };

  if (!loaded) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}><GlassBackground /><div style={{ color: C.muted, fontFamily: "Inter", fontSize: 13 }}>Cargando...</div></div>;

  return (
    <div style={{ minHeight: "100vh" }}>
      <GlassBackground />
      <div style={{ maxWidth: 420, margin: "0 auto", padding: "20px 16px 0", position: "relative" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 18 }}>
          <div style={{ width: 32, height: 32, borderRadius: 10, background: `linear-gradient(135deg, ${C.celeste}, ${C.celesteDeep})`, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: C.shadow, color: "#fff", fontSize: 16 }}>👛</div>
          <div style={{ color: C.ink, fontFamily: "Space Grotesk", fontWeight: 700, fontSize: 18 }}>Mis Finanzas</div>
        </div>
        {tab === "dashboard" ? <Dashboard transactions={transactions} budget={budget} custom={custom} onOpenSettings={() => setShowSettings(true)} /> : <Movimientos transactions={transactions} custom={custom} onAdd={addTransaction} onDelete={deleteTransaction} onRequestCreateCategory={requestCreateCategory} />}
      </div>
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, display: "flex", justifyContent: "center", zIndex: 40 }}>
        <div style={{ maxWidth: 420, width: "100%", margin: "0 12px", marginBottom: "calc(12px + env(safe-area-inset-bottom))", background: C.glassStrong, backdropFilter: "blur(22px)", WebkitBackdropFilter: "blur(22px)", border: `1px solid ${C.glassBorder}`, borderRadius: 24, boxShadow: C.shadow, display: "flex", alignItems: "center", padding: "10px 20px" }}>
          <button onClick={() => setTab("dashboard")} style={{ flex: 1, background: "transparent", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, color: tab === "dashboard" ? C.celesteDeep : C.muted }}>
            <span style={{ fontSize: 18 }}>▦</span><span style={{ fontFamily: "Inter", fontSize: 11, fontWeight: 600 }}>Dashboard</span>
          </button>
          <div style={{ width: 64, display: "flex", justifyContent: "center" }}>
            <button onClick={() => setShowQuickAdd(true)} style={{ width: 54, height: 54, borderRadius: "50%", marginTop: -30, border: "4px solid rgba(255,255,255,0.8)", background: `linear-gradient(135deg, ${C.celeste}, ${C.celesteDeep})`, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", boxShadow: "0 10px 24px rgba(14,165,233,0.45)", fontSize: 26 }}>+</button>
          </div>
          <button onClick={() => setTab("movimientos")} style={{ flex: 1, background: "transparent", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, color: tab === "movimientos" ? C.celesteDeep : C.muted }}>
            <span style={{ fontSize: 18 }}>☰</span><span style={{ fontFamily: "Inter", fontSize: 11, fontWeight: 600 }}>Movimientos</span>
          </button>
        </div>
      </div>
      {showSettings && <SettingsModal budget={budget} custom={custom} onSave={saveBudget} onDeleteCategory={deleteCategory} onClose={() => setShowSettings(false)} />}
      {showQuickAdd && <QuickAddModal custom={custom} onAdd={addTransaction} onRequestCreateCategory={requestCreateCategory} onClose={() => setShowQuickAdd(false)} />}
      {categoryCreatorCtx && <CategoryCreatorModal type={categoryCreatorCtx.type} onCreate={createCategory} onClose={() => setCategoryCreatorCtx(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FinanceApp />);
</script>
</body>
</html>
